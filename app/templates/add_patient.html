<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Add Patient</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
/* ---------- Basic reset ---------- */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,Arial,sans-serif;background:#f4f6f9;color:#222}
a{color:inherit;text-decoration:none}

/* ---------- Layout ---------- */
.wrap{display:flex;min-height:100vh}
.sidebar{
  width:260px;background:#0f1724;color:#fff;padding:28px 18px;
  flex:0 0 260px;box-shadow:2px 0 8px rgba(15,23,36,.06)
}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:22px}
.brand img{width:44px;height:44px;border-radius:6px;object-fit:cover}
.brand h2{font-size:18px;letter-spacing:.2px}
.nav{margin-top:18px}
.nav a{display:block;padding:10px 12px;border-radius:8px;color:#cbd5e1;margin-bottom:6px}
.nav a:hover{background:#111827;color:#fff}

.main{flex:1;padding:20px 28px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.welcome{font-size:20px;font-weight:600;color:#0f1724}
.controls{display:flex;gap:12px;align-items:center}

.btn{
  background:#4f46e5;color:#fff;padding:9px 14px;border-radius:10px;font-weight:600;border:0;
  box-shadow:0 6px 18px rgba(79,70,229,.12);cursor:pointer
}

/* ---------- Form ---------- */
.form-card{
  background:#fff;border-radius:12px;padding:28px;box-shadow:0 6px 20px rgba(15,23,42,.04);max-width:500px;margin:auto
}
.form-card h3{font-size:18px;margin-bottom:20px;color:#0f1724;text-align:center}
.form-card label{display:block;font-weight:600;margin-bottom:6px;color:#0f1724}
.form-card input, .form-card select{
  width:100%;padding:10px;border-radius:8px;border:1px solid #cbd5e1;margin-bottom:16px;font-size:14px
}
.form-card button{
  width:100%;padding:12px;background:#4f46e5;color:#fff;border:none;border-radius:10px;font-weight:600;
  cursor:pointer;box-shadow:0 6px 18px rgba(79,70,229,.12)
}
</style>
</head>
<body>
<div class="wrap">
  <aside class="sidebar">
    <div class="brand">
      <img src="https://via.placeholder.com/44" alt="logo">
      <div>
        <h2>Hospital Admin</h2>
        <div style="font-size:12px;color:#9ca3af">Management</div>
        <div style="font-size:13px;color:#60a5fa;margin-top:6px;">Logged in: {{ admin_name }}</div>
      </div>
    </div>
    <nav class="nav">
      <a href="{{ url_for('index') }}">Dashboard</a>
      <a href="{{ url_for('hospitals') }}">Departments</a>
      <a href="{{ url_for('appointments') }}">Appointments</a>
      <a href="{{ url_for('logout') }}">Logout</a>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="welcome">Add New Patient</div>
      <div class="controls">
        <button class="btn" onclick="location.href='{{ url_for('patients') }}'">Back to Patients</button>
      </div>
    </div>

    <div class="form-card">
      <h3>Add New Patient</h3>
      <form method="POST">
        <label for="name">Name:</label>
        <input type="text" name="name" id="name" required>

        <label for="age">Age:</label>
        <input type="number" name="age" id="age" required>

        <label for="department_id">Department:</label>
        <select name="department_id" id="department_id" required>
          <option value="">-- Select Department --</option>
          {% for dept in departments %}
            <option value="{{ dept.id }}">{{ dept.name }}</option>
          {% endfor %}
        </select>

        <button type="submit">Add Patient</button>
      </form>
    </div>
  </main>
</div>
</body>
</html>
