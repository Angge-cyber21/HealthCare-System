<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Add Diagnosis</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    /* ---------- Basic reset ---------- */
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,Arial, Helvetica, sans-serif;background:#f4f6f9;color:#222}
    a{color:inherit;text-decoration:none}

    /* ---------- Layout ---------- */
    .wrap{display:flex;min-height:100vh}
    .sidebar{
      width:260px;background:#0f1724;color:#fff;padding:28px 18px;flex:0 0 260px;
      box-shadow:2px 0 8px rgba(15,23,36,.06)
    }
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:22px}
    .brand img{width:44px;height:44px;border-radius:6px;object-fit:cover}
    .brand h2{font-size:18px;letter-spacing:.2px}
    .nav{margin-top:18px}
    .nav a{display:block;padding:10px 12px;border-radius:8px;color:#cbd5e1;margin-bottom:6px}
    .nav a:hover{background:#111827;color:#fff}

    .main{flex:1;padding:20px 28px; position: relative;}
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .welcome{font-size:20px;font-weight:600;color:#0f1724}

    .card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 6px 20px rgba(15,23,42,.04);margin-bottom:20px}
    .card h3{font-size:16px;margin-bottom:12px;color:#0f1724}
    input, button{padding:8px 12px;margin:6px 0;border-radius:6px;border:1px solid #ccc;font-size:14px}
    button{background:#4f46e5;color:#fff;border:none;cursor:pointer;transition: all 0.2s ease;}
    button:hover{background:#4338ca;}

    ul{margin-top:10px;list-style-type:disc;padding-left:20px}

    /* Side button */
    .side-button{
      position: absolute;
      top: 20px;
      right: 20px;
      background:#10b981;
      color:#fff;
      padding:10px 16px;
      border-radius:10px;
      font-weight:600;
      box-shadow:0 6px 18px rgba(16,185,129,.3);
      transition: all 0.2s ease;
    }
    .side-button:hover{
      background:#059669;
      box-shadow:0 8px 22px rgba(5,150,105,.4);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="sidebar">
      <div class="brand">
        <img src="/mnt/data/f2f6ff79-c751-4627-9196-3935cee464c4.png" alt="logo">
        <div>
          <h2>Hospital Admin</h2>
          <div style="font-size:12px;color:#9ca3af">Management</div>
        </div>
      </div>

      <nav class="nav">
        <a href="{{ url_for('index') }}">Dashboard</a>
        <a href="{{ url_for('hospitals') }}">Departments</a>
        <a href="{{ url_for('logout') }}">Logout</a>
      </nav>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="welcome">Add Diagnosis</div>
      </div>

         <div class="card">
        <h3>Patient: {{ patient.name }}</h3>

        <form method="POST">
          <label>Diagnosis:</label><br>
          <input type="text" name="diagnosis" required>
          <br><br>
          <button type="submit">Add Diagnosis</button>
        </form>

        <h3>Existing Diagnoses</h3>
        <ul>
          {% for d in diagnoses %}
            <li>{{ d.diagnosis }}</li>
          {% else %}
            <li style="color:#6b7280;">No diagnoses added yet.</li>
          {% endfor %}
        </ul>
      </div>
    </main>
  </div>
</body>
</html>
