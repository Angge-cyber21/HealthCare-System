<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Healthcare Management System</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background-color: #fff;
            padding: 50px 70px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        h1 {
            color: #0072ff;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.1em;
            margin-bottom: 30px;
        }

        .role-buttons {
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .role-buttons a {
            text-decoration: none;
        }

        .role-buttons button {
            background-color: #0072ff;
            color: #fff;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .role-buttons button:hover {
            background-color: #005bb5;
        }

        @media (max-width: 500px) {
            .role-buttons {
                flex-direction: column;
                gap: 15px;
            }

            .container {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to the Healthcare Management System</h1>
        <p>Please choose your role:</p>
        <div class="role-buttons">
            <a href="{{ url_for('login', role='patient') }}"><button>Patient</button></a>
            <a href="{{ url_for('login', role='admin') }}"><button>Admin</button></a>
        </div>
    </div>
</body>
</html>
